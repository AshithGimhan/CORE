<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CORE</title>

    <link rel="icon" type="image/png" href="images/favicon.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Afacad+Flux:wght@100..1000&family=Outfit:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <!-- STYLES -->
    <link rel="stylesheet" href="styles/layout.css" />
    <link rel="stylesheet" href="styles/categories.css" />

    <!-- ICONS -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/regular/style.css"
    />
  </head>

  <body>
    <div class="top-layout">
      <!-- HAMBURGER ON MOBILE -->
      <aside class="sidebar-navigation">
        <div class="nav-top">
          <div class="main-title">
            <i class="ph ph-wallet"></i>
            <h1>Core</h1>
          </div>

          <div class="icons">
            <i class="ph ph-bell"></i>
            <i class="ph ph-moon"></i>
            <div class="js-hamburger-btn hamburger">
              <i class="ph ph-list"></i>
            </div>
          </div>
        </div>

        <nav>
          <div class="js-hamburger-display hamburger-menu-hidden">
            <!-- CLOSE BUTTON -->
            <div class="hamburger-icons">
              <div class="js-ham-close-btn hamburger">
                <i class="ph ph-x"></i>
              </div>
            </div>

            <!-- NAV LINKS -->
            <ul>
              <li>
                <a href="index.html" class="js-nav-links">Dashboard</a>
              </li>
              <li>
                <a href="transactions.html" class="js-nav-links">Transaction</a>
              </li>
              <li>
                <a href="reports.html" class="js-nav-links">Reports</a>
              </li>
              <li>
                <a href="categories.html" class="js-nav-links">Categories</a>
              </li>
              <li>
                <a href="#" class="js-nav-links">Settings</a>
              </li>
            </ul>
          </div>
        </nav>
      </aside>

      <main class="desktop-section">
        <section class="add-category-section">
          <div class="add-category-title">
            <h2>Categories</h2>
            <p>5 categories</p>
          </div>
          <div class="add-category-form-container">
            <div class="form-top">
              <h2>Add categories</h2>
              <button class="js-add-category-btn">Add</button>
            </div>
            <div class="form-input">
              <div class="category-name-container">
                <label for="category-name">Category</label>
                <input
                  type="text"
                  id="category-name"
                  placeholder="category name"
                  class="js-category-name"
                />
                <p class="js-category-error-msg error-msg"></p>
              </div>
              <div class="transaction-type-container">
                <label for="transaction-type">Transaction</label>
                <select
                  class="js-transaction-dropdown expense-dropdown"
                  id="transaction-type"
                >
                  <option value="default">Transaction</option>
                  <option value="income">Income</option>
                  <option value="expense">Expense</option>
                </select>
                <p class="js-type-error-msg error-msg"></p>
              </div>
              <div class="color-picker-container">
                <p class="js-open-btn">Pick a color</p>
                <i class="ph ph-palette js-open-btn"></i>
                <button class="js-remove-color remove-color">
                  Remove color
                </button>
              </div>
            </div>
          </div>
        </section>

        <section class="category-cards-section">
          <div class="js-category-list category-cards-container"></div>
        </section>
      </main>

      <!-- POP UP FOR COLORS -->
      <div class="js-popup popup" id="pop-up">
        <div class="pop-up-wrapper">
          <div class="popup-top">
            <div class="popup-left">
              <i class="ph ph-palette"></i>
              <p>Pick a color</p>
            </div>
            <div class="popup-right">
              <i class="ph ph-x" id="closeBtn"></i>
            </div>
          </div>

          <div class="pop-up-body">
            <div class="swatch" data-color="#E63946"></div>
            <div class="swatch" data-color="#1D3557"></div>
            <div class="swatch" data-color="#2A9D8F"></div>
            <div class="swatch" data-color="#F4A261"></div>
            <div class="swatch" data-color="#9B5DE5"></div>
            <div class="swatch" data-color="#00B4D8"></div>
            <div class="swatch" data-color="#F15BB5"></div>
            <div class="swatch" data-color="#8338EC"></div>
            <div class="swatch" data-color="#06D6A0"></div>
            <div class="swatch" data-color="#577590"></div>
          </div>

          <button class="js-swatch-confirm-btn swatch-confirm-btn">
            Confirm
          </button>
        </div>
      </div>

      <!-- FOOTER -->
      <footer>
        <p>© 2026 Core, Inc. All rights reserved.</p>
      </footer>
    </div>

    <script type="module" src="scripts/categories-page.js"></script>
  </body>
</html>
