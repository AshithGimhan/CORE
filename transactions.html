<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CORE</title>

    <link rel="icon" type="image/png" href="images/favicon.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <!-- STYLES -->
    <link rel="stylesheet" href="styles/layout.css" />
    <link rel="stylesheet" href="styles/transactions.css" />

    <!-- ICONS -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/regular/style.css"
    />

    <script src="https://unpkg.com/jspdf@latest/dist/jspdf.umd.min.js"></script>

  </head>

  <body>
    <div class="top-layout">
      <!-- HAMBURGER ON MOBILE -->
      <aside class="sidebar-navigation">
        <div class="nav-top">
          <div class="main-title">
            <i class="ph ph-wallet"></i>
            <h1>Core</h1>
          </div>

          <div class="icons">
            <i class="ph ph-bell"></i>
            <i class="ph ph-moon"></i>
            <div class="js-hamburger-btn hamburger">
              <i class="ph ph-list"></i>
            </div>
          </div>
        </div>

        <nav>
          <div class="js-hamburger-display hamburger-menu-hidden">
            <!-- CLOSE BUTTON -->
            <div class="hamburger-icons">
              <div class="js-ham-close-btn hamburger">
                <i class="ph ph-x"></i>
              </div>
            </div>

            <!-- NAV LINKS -->
            <ul>
              <li>
                <a href="index.html" class="js-nav-links">Dashboard</a>
              </li>
              <li>
                <a href="transactions.html" class="js-nav-links">Transaction</a>
              </li>
              <li>
                <a href="reports.html" class="js-nav-links">Reports</a>
              </li>
              <li>
                <a href="categories.html" class="js-nav-links">Categories</a>
              </li>
              <li>
                <a href="#" class="js-nav-links">Settings</a>
              </li>
            </ul>
          </div>
        </nav>
      </aside>

      <main class="desktop-section">
        <section class="transaction-list-options">
          <div class="transaction-filter-options">
            <header class="transaction-filter-options-top">
              <div>
                <h2>Transactions</h2>
                <p class="js-transaction-count"></p>
              </div>
              <div class="download-button">
                <i class="ph ph-export"></i>
                <a class="js-export-button" type="button">Export</a>
              </div>
            </header>

            <div class="transaction-filter-options-middle filter-options">
              <span class="js-filter-btn" data-filter="all">All</span>
              <span class="js-filter-btn" data-filter="income">Income</span>
              <span class="js-filter-btn" data-filter="expense">Expense</span>
            </div>

            <form
              class="transaction-filter-form"
              aria-label="Transaction filters"
            >
              <select
                class="food-dropdown"
                id="category-type"
                name="category-type"
              >
                <option value="all">Category</option>
                <option value="food">Food</option>
                <option value="transport">Transport</option>
                <option value="bills">Bills</option>
                <option value="salary">Salary</option>
                <option value="other">Other</option>
              </select>
              <input
                type="date"
                class="js-date-input date-input"
                id="date"
                name="date"
              />
              <input
                type="text"
                class="js-search-input search-input"
                id="search"
                name="search"
                placeholder="Search"
              />
              <select
                name="filter-dropdown"
                id="filter-dropdown"
                class="js-sort"
                aria-label="Sort transactions"
              >
                <option value="default">Filter</option>
                <option value="newest-first">Newest first</option>
                <option value="oldest-first">Oldest first</option>
                <option value="highest-amount">Highest first</option>
                <option value="lowest-amount">Lowest first</option>
              </select>
            </form>
          </div>
          <!-- CLEAR FILTER -->
          <div class="clear-filter-container">
            <button class="js-clear-filter-sort clear-filter-btn">
              Clear filter
            </button>
          </div>
        </section>

        <section class="transaction-list-view">
          <div class="table-wrapper">
            <table>
              <thead>
                <tr>
                  <th>Description</th>
                  <th>Category</th>
                  <th>Date</th>
                  <th>Amount</th>
                  <th></th>
                </tr>
              </thead>
              <tbody class="js-transactions-list-view"></tbody>
            </table>
            <div class="js-empty-transactions"></div>
          </div>
          <div class="page-numbers-container">
            <div class="js-page-numbers page-numbers"></div>
            <div class="js-page-number-display display-page-numbers"></div>
          </div>
        </section>
      </main>

      <!-- POP UP -->
      <div class="js-pop-up-transaction pop-up">
        <div class="pop-up-container">
          <h3>Confirm deletion of transaction</h3>

          <div class="pop-up-buttons">
            <button class="js-btn-confirm">Confirm</button>
            <button class="js-btn-cancel">Exit</button>
          </div>
        </div>
      </div>

      <!-- FOOTER -->
      <footer>
        <p>© 2026 Core, Inc. All rights reserved.</p>
      </footer>
    </div>

    <script type="module" src="scripts/transactions-page.js"></script>
  </body>
</html>
