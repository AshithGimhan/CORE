<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CORE</title>

    <link rel="icon" type="image/png" href="images/favicon.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Afacad+Flux:wght@100..1000&family=Outfit:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <!-- STYLES -->
    <link rel="stylesheet" href="styles/dashboard.css" />

    <!-- ICONS -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/regular/style.css"
    />
  </head>

  <body>
    <div class="top-layout">
      <!-- HAMBURGER ON MOBILE -->
      <aside class="sidebar-navigation">
        <div class="nav-top">
          <div class="main-title">
            <i class="ph ph-wallet"></i>
            <h1>Core</h1>
          </div>

          <div class="icons">
            <i class="ph ph-bell"></i>
            <i class="ph ph-moon"></i>
            <div class="js-hamburger-btn hamburger">
              <i class="ph ph-list"></i>
            </div>
          </div>
        </div>

        <nav>
          <div class="js-hamburger-display hamburger-menu-hidden">
            <!-- CLOSE BUTTON -->
            <div class="hamburger-icons">
              <div class="js-ham-close-btn hamburger">
                <i class="ph ph-x"></i>
              </div>
            </div>

            <!-- NAV LINKS -->
            <ul>
              <li>
                <a href="index.html">Dashboard</a>
              </li>
              <li>
                <a href="transactions.html">Transaction</a>
              </li>
              <li>
                <a href="#">Reports</a>
              </li>
              <li>
                <a href="#">Categories</a>
              </li>
              <li>
                <a href="#">Settings</a>
              </li>
            </ul>
          </div>
        </nav>
      </aside>

      <!-- HERO SECTION -->
      <section class="hero-section">
        <div class="hero-top">
          <!-- NET BALANCE -->
          <div class="net-balance">
            <h2>Net balance</h2>
            <p class="js-balance-value balance"></p>
          </div>

          <!-- DATE AND TRANSACTION COUNT -->
          <div class="date-count-stats">
            <div class="date-stats">
              <span></span>
              <p>June 2026</p>
            </div>

            <div class="count-stats">
              <span></span>
              <p class="js-transaction-count transactions"></p>
              <p>Transactions</p>
            </div>
          </div>
        </div>

        <!-- STAT CARDS -->
        <div class="cards-section">
          <div class="cards-container">
            <div class="stat-cards">
              <p>Total income</p>
              <span class="js-income-value income"></span>
            </div>

            <div class="stat-cards">
              <p>Total expense</p>
              <span class="js-expense-value expense"></span>
            </div>
          </div>
        </div>
      </section>

      <!-- MAIN CONTENT -->
      <main class="desktop-section">
        <!-- TRANSACTION LIST -->
        <section class="transaction-list-section">
          <div class="transaction-list-top">
            <!-- FILTER OPTIONS -->
            <div class="filter-options">
              <span class="js-filter-btn" data-filter="all">All</span>
              <span class="js-filter-btn" data-filter="income">Income</span>
              <span class="js-filter-btn" data-filter="expense">Expense</span>
            </div>

            <!-- SORT DROPDOWN -->
            <div class="dropdown">
              <select name="filter-dropdown" class="js-sort">
                <option value="default">Filter</option>
                <option value="newest-first">Newest first</option>
                <option value="oldest-first">Oldest first</option>
                <option value="highest-amount">Highest first</option>
                <option value="lowest-amount">Lowest first</option>
              </select>
            </div>
          </div>

          <!-- CLEAR FILTER -->
          <div class="clear-filter-container">
            <button class="js-clear-filter-sort clear-filter-btn">
              Clear filter
            </button>
          </div>

          <!-- LIST AND PAGINATION -->
          <div class="transaction-list">
            <h2>Transactions</h2>
            <div class="js-transaction-list transaction-list-container"></div>
            <div class="js-page-numbers page-numbers"></div>
          </div>
        </section>

        <!-- FORM -->
        <section class="transaction-form-section">
          <h2>Add transaction</h2>

          <form action="" class="transaction-form">
            <div class="form-input-container">
              <label for="description">Description</label>
              <input
                type="text"
                placeholder="Description"
                class="js-description-input"
                id="description"
              />
              <p class="js-description-error error"></p>

              <label for="number">Amount</label>
              <input
                type="text"
                placeholder="Amount"
                class="js-amount-input"
                id="number"
              />
              <p class="js-amount-error error"></p>

              <div class="side-by-side">
                <div>
                  <label for="transaction-type">Type</label>
                  <select
                    class="js-transaction-dropdown expense-dropdown"
                    id="transaction-type"
                  >
                    <option value="default">Transaction</option>
                    <option value="income">Income</option>
                    <option value="expense">Expense</option>
                  </select>
                  <p class="js-transaction-type-error error"></p>
                </div>
                <div>
                  <label for="category-type">Category</label>
                  <select
                    class="js-category-dropdown food-dropdown"
                    id="category-type"
                  >
                    <option value="default">Category</option>
                    <option value="food">Food</option>
                    <option value="transport">Transport</option>
                    <option value="bills">Bills</option>
                    <option value="salary">Salary</option>
                    <option value="other">Other</option>
                  </select>
                  <p class="js-category-error error"></p>
                </div>
              </div>

              <label for="date">Date</label>
              <input type="date" class="js-date-input date-input" id="date" />
              <p class="js-date-error error"></p>
            </div>

            <div>
              <button
                type="button"
                class="js-add-transaction add-transaction-btn"
              >
                Add transaction
              </button>
            </div>
          </form>
        </section>
      </main>

      <!-- POP UP -->
      <div class="js-pop-up pop-up">
        <div class="pop-up-container">
          <h3>Confirm deletion of transaction</h3>

          <div class="pop-up-buttons">
            <button class="js-btn-confirm">Confirm</button>
            <button class="js-btn-cancel">Exit</button>
          </div>
        </div>
      </div>

      <!-- FOOTER -->
      <footer>
        <p>© 2026 Core, Inc. All rights reserved.</p>
      </footer>
    </div>

    <script type="module" src="scripts/dashboard.js"></script>
  </body>
</html>
